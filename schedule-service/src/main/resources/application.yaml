spring:
  application:
    name: schedule-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/schedule_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:mysecretpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

services:
  provider-service:
    url: ${PROVIDER_SERVICE_URL:http://localhost:8081}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
