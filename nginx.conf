server {
    listen 8080;

    # Schedule endpoints are nested under /api/providers/{id}/schedules —
    # this regex location takes precedence over the prefix match below.
    location ~ ^/api/providers/[0-9]+/schedules {
        proxy_pass         http://schedule-service:8082;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/providers {
        proxy_pass         http://provider-service:8081;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/appointments {
        proxy_pass         http://appointment-service:8083;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
