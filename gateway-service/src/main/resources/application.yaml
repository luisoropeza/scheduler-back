server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: schedule-public
              uri: ${SCHEDULE_SERVICE_URL}
              predicates:
                - Path=/api/schedules/**
            - id: schedule-service
              uri: ${SCHEDULE_SERVICE_URL}
              predicates:
                - Path=/api/personal/{doctorId}/schedules,/api/personal/{doctorId}/schedules/**
            - id: user-service
              uri: ${USER_SERVICE_URL}
              predicates:
                - Path=/api/auth/**,/api/personal/**,/api/patients/**,/api/specialties,/api/roles
            - id: appointment-service
              uri: ${APPOINTMENT_SERVICE_URL}
              predicates:
                - Path=/api/appointments,/api/appointments/**
