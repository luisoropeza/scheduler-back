server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: schedule-service
              uri: ${SCHEDULE_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/providers/{providerId}/schedules,/api/providers/{providerId}/schedules/**
            - id: provider-service
              uri: ${PROVIDER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/providers,/api/providers/**
            - id: appointment-service
              uri: ${APPOINTMENT_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/appointments,/api/appointments/**
