spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # Schedule routes must come before provider routes — more specific path wins.
        - id: schedule-service
          uri: ${SCHEDULE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/providers/*/schedules,/api/providers/*/schedules/**

        - id: provider-service
          uri: ${PROVIDER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/providers,/api/providers/**

        - id: appointment-service
          uri: ${APPOINTMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/appointments,/api/appointments/**

server:
  port: ${PORT:8080}
